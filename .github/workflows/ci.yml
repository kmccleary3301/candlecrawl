name: CandleCrawl CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:

jobs:
  unit-and-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,service,browser,pdf,ocr]"
      - name: Run unit/API tests
        run: |
          pytest -q tests/test_package_cli.py tests/test_cli_service_smoke.py tests/test_api.py tests/test_frontier.py tests/test_http_client.py tests/test_crawl_policies.py tests/test_crawl_extreme.py

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate package artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Clean wheel install and CLI smoke
        run: |
          python -m venv /tmp/candlecrawl-wheel-smoke
          /tmp/candlecrawl-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/candlecrawl-wheel-smoke/bin/python -m pip install 'dist/candlecrawl-0.1.0a1-py3-none-any.whl[service,browser,pdf,ocr]'
          /tmp/candlecrawl-wheel-smoke/bin/python - <<'PY'
          import sys
          import candlecrawl
          import candlecrawl.client
          import candlecrawl.errors
          import candlecrawl.schemas
          import candlecrawl.trace

          assert candlecrawl.__version__
          assert "app.main" not in sys.modules
          PY
          /tmp/candlecrawl-wheel-smoke/bin/candlecrawl version
          /tmp/candlecrawl-wheel-smoke/bin/candlecrawl doctor
          /tmp/candlecrawl-wheel-smoke/bin/candlecrawl export-openapi --strict-v2 --output /tmp/candlecrawl-openapi.yaml
          test -s /tmp/candlecrawl-openapi.yaml

  contract-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate contract artifact exists and contains required paths
        run: |
          test -f contracts/openapi-v1.yaml
          test -f contracts/openapi-v2-strict.yaml
          grep -q "openapi:" contracts/openapi-v1.yaml
          grep -q "openapi:" contracts/openapi-v2-strict.yaml
          grep -q "/v2/scrape" contracts/openapi-v1.yaml
          grep -q "/v2/scrape" contracts/openapi-v2-strict.yaml
          grep -q "/v2/map" contracts/openapi-v1.yaml
          grep -q "/v2/map" contracts/openapi-v2-strict.yaml
          grep -q "/v2/crawl" contracts/openapi-v1.yaml
          grep -q "/v2/crawl" contracts/openapi-v2-strict.yaml
          grep -q "/v2/actions/capabilities" contracts/openapi-v2-strict.yaml
